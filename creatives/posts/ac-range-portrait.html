<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#16265F;--deep:#0D193A;--green:#1FA855;--blue:#2E7DEE;--yellow:#F2B713;--mist:#C4CCE2}
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;background:var(--deep);font-family:"Inter Tight",sans-serif;color:#fff;position:relative;overflow:hidden}
  .photo{position:absolute;inset:0 0 auto 0;height:560px;width:100%;object-fit:cover}
  .photo-fade{position:absolute;left:0;right:0;top:360px;height:230px;background:linear-gradient(to bottom,rgba(13,25,58,0),var(--deep))}
  .logo{position:absolute;top:44px;left:56px;height:50px;z-index:3;background:#fff;border-radius:12px;padding:9px 13px}
  .panel{position:absolute;left:0;right:0;bottom:0;padding:0 56px 48px;z-index:2}
  .eyebrow{font-size:20px;letter-spacing:.16em;text-transform:uppercase;color:var(--yellow);font-weight:700}
  h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:68px;line-height:.98;letter-spacing:-.01em;margin-top:8px}
  h1 em{font-style:italic;color:var(--yellow)}
  .props{display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:20px}
  .prop{font-weight:700;font-size:23px;color:#EAEEF8}
  .prop b{color:var(--green)}
  .models{display:flex;gap:14px;margin-top:24px}
  .model{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(196,204,226,.3);border-radius:18px;padding:20px 14px;text-align:center}
  .model.lead{border:2px solid var(--yellow);background:rgba(242,183,19,.10)}
  .model .code{font-family:"Instrument Serif",serif;font-weight:400;font-size:46px;line-height:1}
  .model .v{font-size:18px;letter-spacing:.04em;color:#9FC2FF;font-weight:600;margin-top:4px}
  .cta{display:flex;align-items:center;gap:18px;margin-top:26px}
  .pill{background:var(--green);color:#fff;font-weight:800;font-size:32px;border-radius:999px;padding:24px 38px;display:flex;align-items:center;gap:16px}
  .pill .ic{width:36px;height:36px;flex:0 0 36px}
</style>
</head>
<body>
  <img class="photo" src="../assets/ac-composite.png" alt="Voltec AC stabilizer range" />
  <div class="photo-fade"></div>
  <img class="logo" src="../assets/voltec-logo.png" alt="Voltec Appliances" />

  <div class="panel">
    <div class="eyebrow">Heat wave · AC protection</div>
    <h1>Har voltage ke liye <em>ek</em> AC stabilizer.</h1>

    <div class="props">
      <span class="prop"><b>✓</b> 10,000 Watts</span>
      <span class="prop"><b>✓</b> 99% pure copper</span>
      <span class="prop"><b>✓</b> Energy saver</span>
      <span class="prop"><b>✓</b> 1 &amp; 1.5 ton AC</span>
    </div>

    <div class="models">
      <div class="model"><div class="code">R2</div><div class="v">FROM 150V</div></div>
      <div class="model lead"><div class="code">R3</div><div class="v">FROM 120V</div></div>
      <div class="model"><div class="code">R4</div><div class="v">FROM 100V</div></div>
    </div>

    <div class="cta">
      <div class="pill">
        <svg class="ic" viewBox="0 0 32 32" fill="#fff"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.6 1.8 6.5L3 29l7.2-2.3c1.8 1 3.9 1.5 5.8 1.5 7 0 12.5-5.5 12.5-12.5S23 3 16 3zm0 22.7c-1.8 0-3.5-.5-5-1.4l-.4-.2-4.3 1.4 1.4-4.2-.3-.4c-1-1.6-1.5-3.4-1.5-5.4 0-5.6 4.6-10.2 10.1-10.2s10.1 4.6 10.1 10.2S21.6 25.7 16 25.7z"/><path d="M21.6 18.3c-.3-.2-1.8-.9-2-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-1 1.2-.2.2-.4.2-.7.1-.3-.2-1.3-.5-2.5-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.7l.5-.6c.2-.2.2-.3.3-.5.1-.2 0-.4 0-.6l-.9-2.2c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.2.2 2.2 3.4 5.3 4.7.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.3.2-1.4-.1-.2-.3-.3-.6-.4z"/></svg>
        <span>WhatsApp par order karein</span>
      </div>
    </div>
  </div>
</body>
</html>
