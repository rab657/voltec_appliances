<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#16265F;--deep:#0D193A;--red:#A82C28;--green:#1FA855;--blue:#2E7DEE;--cream:#FBFAF7}
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;background:var(--cream);font-family:"Inter Tight",sans-serif;color:var(--navy);
    padding:56px 56px 48px;position:relative;overflow:hidden;display:flex;flex-direction:column}
  body::after{content:"";position:absolute;right:-160px;top:-120px;width:680px;height:680px;border-radius:50%;
    background:radial-gradient(circle,rgba(46,125,238,.12),transparent 64%);z-index:0}
  .z{position:relative;z-index:1}
  header{display:flex;justify-content:space-between;align-items:center}
  .logo{height:56px}
  .since{font-size:18px;letter-spacing:.2em;color:var(--navy);opacity:.55;font-weight:600}
  .eyebrow{font-size:20px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;margin-top:24px}
  h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:62px;line-height:.98;letter-spacing:-.01em;margin-top:8px;max-width:17ch}
  h1 em{font-style:italic;color:var(--red)}
  .hero{flex:1;display:flex;align-items:center;justify-content:center;margin:4px 0}
  .hero img{max-width:660px;max-height:360px;width:auto;height:auto;filter:drop-shadow(0 26px 44px rgba(13,25,58,.30))}
  .props{display:grid;grid-template-columns:1fr 1fr;gap:16px 30px}
  .prop{display:flex;gap:12px;font-weight:700;font-size:24px;line-height:1.15;align-items:flex-start}
  .prop .tick{color:var(--green);font-weight:800;flex:0 0 auto}
  .cta{display:flex;align-items:center;gap:18px;margin-top:26px}
  .pill{background:var(--green);color:#fff;font-weight:800;font-size:33px;border-radius:999px;padding:24px 40px;display:flex;align-items:center;gap:16px}
  .pill .ic{width:36px;height:36px;flex:0 0 36px}
  .callnote{font-weight:700;font-size:23px;color:var(--navy);opacity:.8;line-height:1.25}
</style>
</head>
<body>
  <header class="z">
    <img class="logo" src="../assets/voltec-logo.png" alt="Voltec Appliances" />
    <span class="since">SINCE 1995</span>
  </header>

  <div class="eyebrow z">AC wale gharon ke liye</div>
  <h1 class="z">AC <em>low-voltage</em> ki wajah se band ho jata hai?</h1>

  <div class="hero z"><img src="../assets/ac-a100.png" alt="Voltec A-100 AC stabilizer" /></div>

  <div class="props z">
    <div class="prop"><span class="tick">✓</span><span>1 &amp; 1.5 ton AC — inverter &amp; normal</span></div>
    <div class="prop"><span class="tick">✓</span><span>Heavy-duty — 10,000 Watts</span></div>
    <div class="prop"><span class="tick">✓</span><span>99% pure copper transformer</span></div>
    <div class="prop"><span class="tick">✓</span><span>Energy saver — 10% kam current</span></div>
  </div>

  <div class="cta z">
    <div class="pill">
      <svg class="ic" viewBox="0 0 32 32" fill="#fff"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.6 1.8 6.5L3 29l7.2-2.3c1.8 1 3.9 1.5 5.8 1.5 7 0 12.5-5.5 12.5-12.5S23 3 16 3zm0 22.7c-1.8 0-3.5-.5-5-1.4l-.4-.2-4.3 1.4 1.4-4.2-.3-.4c-1-1.6-1.5-3.4-1.5-5.4 0-5.6 4.6-10.2 10.1-10.2s10.1 4.6 10.1 10.2S21.6 25.7 16 25.7z"/><path d="M21.6 18.3c-.3-.2-1.8-.9-2-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-1 1.2-.2.2-.4.2-.7.1-.3-.2-1.3-.5-2.5-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.7l.5-.6c.2-.2.2-.3.3-.5.1-.2 0-.4 0-.6l-.9-2.2c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.2.2 2.2 3.4 5.3 4.7.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.3.2-1.4-.1-.2-.3-.3-.6-.4z"/></svg>
      <span>WhatsApp par order karein</span>
    </div>
    <div class="callnote">Sahi model<br />hum batayenge</div>
  </div>
</body>
</html>
