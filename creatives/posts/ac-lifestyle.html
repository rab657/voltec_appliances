<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  /* Website theme: Instrument Serif + Inter Tight, paper/ink/maroon + warm gold */
  :root{
    --ink:oklch(21% 0.012 30); --accent:oklch(46% 0.092 30); --sun:oklch(80% 0.13 72);
    --paper:oklch(98.5% 0.003 60); --wa:#1FA855;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:"Inter Tight",sans-serif;color:#fff}
  .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .top-scrim{position:absolute;top:0;left:0;right:0;height:480px;
    background:linear-gradient(to bottom,rgba(8,10,18,.82),rgba(8,10,18,.30) 55%,transparent)}
  /* lighter, lower scrim so it grounds the CTA without burying the product */
  .bot-scrim{position:absolute;bottom:0;left:0;right:0;height:260px;
    background:linear-gradient(to top,rgba(6,8,14,.60),rgba(6,8,14,.12) 60%,transparent)}
  /* warm spotlight on the stabilizer — the star */
  .spot{position:absolute;inset:0;z-index:1;
    background:radial-gradient(440px 380px at 62% 76%,rgba(255,239,206,.22),transparent 66%)}
  .z{position:relative;z-index:2}
  .logochip{position:absolute;top:48px;left:56px;background:var(--paper);border-radius:13px;padding:10px 14px;display:flex;align-items:center}
  .logochip img{height:44px}
  .head{position:absolute;top:128px;left:56px;right:120px}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:21px;letter-spacing:.2em;text-transform:uppercase;color:var(--sun);font-weight:600}
  h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:74px;line-height:.98;letter-spacing:-.01em;margin-top:14px;text-shadow:0 2px 24px rgba(0,0,0,.45)}
  h1 em{font-style:italic;color:var(--sun)}
  .subspec{font-weight:600;font-size:22px;color:rgba(255,255,255,.94);margin-top:18px;text-shadow:0 1px 12px rgba(0,0,0,.6)}
  .subspec b{color:var(--sun);font-weight:800}
  .foot{position:absolute;left:56px;bottom:52px}
  .pill{background:var(--wa);color:#fff;font-weight:700;font-size:23px;letter-spacing:.01em;border-radius:999px;padding:14px 24px;display:inline-flex;align-items:center;gap:11px;box-shadow:0 8px 22px rgba(0,0,0,.32)}
  .pill .ic{width:24px;height:24px;flex:0 0 24px}
  .prodname{position:absolute;right:56px;bottom:60px;z-index:2;text-align:right;font-family:"Instrument Serif",serif;font-size:34px;line-height:1.04;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.75)}
  .prodname b{color:var(--sun);font-weight:400;font-style:italic}
</style>
</head>
<body>
  <img class="bg" src="../assets/ac-bedroom.png" alt="AC running all night with a Voltec stabilizer" />
  <div class="top-scrim"></div>
  <div class="spot"></div>
  <div class="bot-scrim"></div>

  <div class="logochip z"><img src="../assets/voltec-logo.png" alt="Voltec Appliances" /></div>

  <div class="head z">
    <div class="eyebrow">AC wale gharon ke liye</div>
    <h1>AC raat bhar chale —<br /><em>kam voltage</em> par bhi.</h1>
    <div class="subspec">1 &amp; 1.5 ton AC <b>·</b> 10,000W <b>·</b> 99% pure copper <b>·</b> energy saver</div>
  </div>

  <div class="foot z">
    <div class="pill">
      <svg class="ic" viewBox="0 0 32 32" fill="#fff"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.6 1.8 6.5L3 29l7.2-2.3c1.8 1 3.9 1.5 5.8 1.5 7 0 12.5-5.5 12.5-12.5S23 3 16 3zm0 22.7c-1.8 0-3.5-.5-5-1.4l-.4-.2-4.3 1.4 1.4-4.2-.3-.4c-1-1.6-1.5-3.4-1.5-5.4 0-5.6 4.6-10.2 10.1-10.2s10.1 4.6 10.1 10.2S21.6 25.7 16 25.7z"/><path d="M21.6 18.3c-.3-.2-1.8-.9-2-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-1 1.2-.2.2-.4.2-.7.1-.3-.2-1.3-.5-2.5-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.7l.5-.6c.2-.2.2-.3.3-.5.1-.2 0-.4 0-.6l-.9-2.2c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.2.2 2.2 3.4 5.3 4.7.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.3.2-1.4-.1-.2-.3-.3-.6-.4z"/></svg>
      <span>WhatsApp par order karein</span>
    </div>
  </div>

  <div class="prodname z"><b>Voltec</b><br />Voltage Stabilizer</div>
</body>
</html>
